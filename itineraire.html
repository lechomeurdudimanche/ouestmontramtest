<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://lechomeurdudimanche.github.io/ouestmontram/logo.png" type="image/png">
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Itinéraire – Où est mon tram ?</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --bg-hover: #2a2a2a;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --border: #333;
            --accent: #00d2ff;
            --nav-h: 60px;
            --app-height: 100vh;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; tap-highlight-color: transparent;}
        html { overscroll-behavior: none; }
        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #map {
            position: absolute;
            top: 0; left: 0; right: 0;
            bottom: var(--nav-h);
            z-index: 0;
        }
        .leaflet-control-attribution { background: rgba(255,255,255,0.7) !important; font-size: 9px !important; }
        .leaflet-control-zoom a { background: #fff !important; color: #333 !important; border-color: #ddd !important; }
        .stop-tooltip {
            background: rgba(255,255,255,0.9) !important;
            border: none !important; box-shadow: 0 1px 4px rgba(0,0,0,0.18) !important;
            border-radius: 3px !important; padding: 1px 5px !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 10px !important; font-weight: 600 !important;
            color: #222 !important; white-space: nowrap;
        }
        .stop-tooltip::before { display: none !important; }

        #search-float {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 12px 12px 0;
        }
        #search-card {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 6px 28px rgba(0,0,0,0.55);
        }
        .sf-fields { display: flex; align-items: stretch; }
        .sf-dots {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 10px; gap: 3px; flex-shrink: 0;
            border-right: 1px solid var(--border);
        }
        .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .dot-from { background: #888; }
        .dot-to   { background: #e53935; }
        .dot-mid  { width: 1px; height: 15px; background: var(--border); }
        .sf-inputs { flex: 1; min-width: 0; }
        .sf-row {
            display: flex; align-items: center; padding: 10px 10px 10px 12px;
            border-bottom: 1px solid var(--border); gap: 6px;
        }
        .sf-row:last-child { border-bottom: none; }
        .sf-row input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 0.87rem; font-family: inherit; min-width: 0;
        }
        .sf-row input::placeholder { color: var(--text-muted); }
        .swap-btn {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
            background: var(--bg-hover); border: 1px solid var(--border);
        }
        .swap-btn:active { background: #333; }

        #bottom-sheet {
            position: absolute;
            bottom: var(--nav-h); left: 0; right: 0;
            background: var(--bg-dark);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border);
            z-index: 110;
            display: flex; flex-direction: column;
            height: 0; overflow: hidden;
            transition: none;
        }
        .sh-handle-area { padding: 8px 0 2px; cursor: grab; flex-shrink: 0; touch-action: none; }
        .sh-handle { width: 36px; height: 4px; background: #3a3a3a; border-radius: 2px; margin: 0 auto; }

        #sheet-results { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        #sheet-results.hidden { display: none; }

        #options-bar {
            display: flex; align-items: center; gap: 7px;
            padding: 9px 14px 9px 16px;
            border-bottom: 1px solid #1a1a1a;
            overflow-x: auto; flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        #options-bar::-webkit-scrollbar { display: none; }

        #refresh-btn {
            display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
            background: #1c1c1c; border: 1.5px solid var(--border);
            color: var(--text-muted); cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #refresh-btn:active { background: #2a2a2a; color: var(--text-main); }
        #refresh-btn.spinning svg { animation: spin 0.55s linear; }

        .opt-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 13px; border-radius: 20px; flex-shrink: 0;
            font-size: 0.75rem; font-weight: 500; cursor: pointer;
            user-select: none; white-space: nowrap;
            border: 1.5px solid var(--border); background: #1c1c1c;
            color: var(--text-muted); transition: border-color 0.15s, background 0.15s, color 0.15s;
        }
        .opt-chip:active { background: #252525; }
        .opt-chip.active {
            background: rgba(0,210,255,0.08);
            border-color: rgba(0,210,255,0.45);
            color: var(--accent); font-weight: 600;
        }

        .opt-chip .chip-caret {
            width: 10px; height: 10px; opacity: 0.45; flex-shrink: 0;
            transition: transform 0.2s;
        }
        .opt-chip.popup-open .chip-caret { transform: rotate(180deg); opacity: 0.8; }

        .opt-sep {
            width: 1px; height: 18px; background: #2e2e2e; flex-shrink: 0; border-radius: 1px;
        }

        #opt-backdrop {
            position: fixed; inset: 0;
            z-index: 400;
            background: rgba(0,0,0,0.35);
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s ease;
            backdrop-filter: blur(1px);
        }
        #opt-backdrop.open { opacity: 1; pointer-events: all; }

        #opt-popup {
            position: fixed;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            width: min(400px, calc(100vw - 32px));
            background: #202020;
            border: 1px solid #383838;
            border-radius: 20px;
            z-index: 410;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.22,1,0.36,1);
            overflow: hidden;
        }
        #opt-popup.open {
            opacity: 1; pointer-events: all;
            transform: translateX(-50%) translateY(0);
        }

        .popup-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 16px 12px;
        }
        .popup-title {
            font-size: 0.95rem; font-weight: 700; color: var(--text-main);
            letter-spacing: -0.01em;
        }
        .popup-close {
            width: 28px; height: 28px; border-radius: 50%;
            background: #2e2e2e; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 1.1rem; line-height: 1;
            flex-shrink: 0; transition: background 0.15s, color 0.15s;
        }
        .popup-close:active { background: #3a3a3a; color: var(--text-main); }

        .popup-divider { height: 1px; background: #2c2c2c; margin: 0 16px; }

        .popup-options { padding: 6px 0 4px; }

        .pop-opt {
            display: flex; align-items: center; gap: 13px;
            padding: 12px 16px; cursor: pointer;
            transition: background 0.1s;
            border-radius: 0;
        }
        .pop-opt:active { background: #272727; }

        .pop-check {
            width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid #3a3a3a;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s, background 0.15s;
        }
        .pop-check svg { opacity: 0; transition: opacity 0.15s; }
        .pop-opt.selected .pop-check {
            border-color: var(--accent);
            background: var(--accent);
        }
        .pop-opt.selected .pop-check svg { opacity: 1; }

        .pop-opt-body { flex: 1; min-width: 0; }
        .pop-opt-label { font-size: 0.88rem; font-weight: 600; color: var(--text-main); }
        .pop-opt-sub   { font-size: 0.73rem; color: var(--text-muted); margin-top: 2px; font-weight: 400; }

        #pop-time-input-wrap {
            margin: 4px 16px 12px;
            display: none;
        }
        #pop-time-input-wrap.show { display: block; }
        #pop-time-input-wrap label {
            display: block; font-size: 0.72rem; font-weight: 600;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.04em; margin-bottom: 6px;
        }
        #custom-time-input {
            width: 100%; background: #141414; border: 1.5px solid #383838;
            border-radius: 12px; color: var(--text-main); padding: 10px 14px;
            font-size: 0.9rem; font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        #custom-time-input:focus { border-color: var(--accent); }

        .pop-confirm-btn {
            display: none; width: calc(100% - 32px); margin: 0 16px 14px;
            padding: 11px; border-radius: 12px; border: none; cursor: pointer;
            background: var(--accent); color: #000; font-weight: 700;
            font-size: 0.88rem; font-family: inherit;
            transition: opacity 0.15s;
        }
        .pop-confirm-btn:active { opacity: 0.8; }
        .pop-confirm-btn.show { display: block; }

        #results-list { flex: 1; overflow-y: auto; padding: 6px 10px 10px; }
        #results-list::-webkit-scrollbar { display: none; }

        .rcard {
            background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 14px; padding: 11px 13px; margin-bottom: 7px;
            cursor: pointer; transition: border-color 0.15s, background 0.12s;
            user-select: none;
            animation: fadeSlide 0.22s cubic-bezier(0.25,0.46,0.45,0.94) both;
        }
        .rcard:nth-child(1) { animation-delay: 0.00s; }
        .rcard:nth-child(2) { animation-delay: 0.05s; }
        .rcard:nth-child(3) { animation-delay: 0.10s; }
        .rcard:nth-child(4) { animation-delay: 0.15s; }
        .rcard:nth-child(5) { animation-delay: 0.20s; }
        .rcard:active { background: #202020; }

        .rc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
        .rc-times { font-size: 0.93rem; font-weight: 700; color: var(--text-main); }
        .rc-dur  { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }

        .jbar { display: flex; align-items: center; gap: 4px; margin-bottom: 7px; flex-wrap: wrap; }
        .jb-walk-icon { font-size: 0.82rem; line-height: 1; }
        .jb-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 22px; height: 22px; border-radius: 11px; padding: 0 5px;
            font-size: 0.6rem; font-weight: 800; color: white; flex-shrink: 0;
        }
        .jb-arrow { font-size: 1rem; color: #555; line-height: 1; }

        .rc-foot { display: flex; gap: 10px; padding-top: 6px; border-top: 1px solid #1e1e1e; flex-wrap: wrap; }
        .rc-foot span { font-size: 0.7rem; color: var(--text-muted); }

        #sheet-detail { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #sheet-detail.active { display: flex; }

        #dv-header {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px; flex-shrink: 0;
            display: flex; align-items: center; gap: 10px;
        }
        .back-btn {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; cursor: pointer;
            background: var(--bg-panel); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 1.3rem; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .back-btn:active { background: var(--bg-hover); }
        #dv-summary { flex: 1; }
        .dvs-time { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }
        .dvs-route { font-size: 0.71rem; color: var(--text-muted); margin-top: 2px; }

        #dv-steps { flex: 1; overflow-y: auto; padding: 12px 14px 20px; }
        #dv-steps::-webkit-scrollbar { display: none; }

        .step { display: flex; gap: 12px; margin-bottom: 2px; }
        .step-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 30px; }
        .sdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
        .sdot-from { background: #888; border: 2px solid #888; }
        .sdot-walk { border: 2px solid #444; background: var(--bg-dark); }
        .svline { width: 3px; flex: 1; min-height: 18px; background: #252525; margin: 3px 0; border-radius: 2px; }
        .svline-walk { background: repeating-linear-gradient(to bottom, #444 0, #444 4px, transparent 4px, transparent 8px); }
        .step-body { flex: 1; padding-bottom: 14px; min-width: 0; }
        .step-title { font-size: 0.84rem; font-weight: 600; color: var(--text-main); }
        .step-sub   { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }

        .ts-depart-name {
            font-size: 0.88rem; font-weight: 700; color: var(--text-main);
            margin-bottom: 8px;
        }
        .ts-line-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .ts-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 26px; height: 26px; border-radius: 13px; padding: 0 6px;
            font-size: 0.66rem; font-weight: 800; color: white; flex-shrink: 0;
        }
        .ts-direction {
            flex: 1; font-size: 0.8rem; color: var(--text-muted); min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ts-time {
            font-size: 1.55rem; font-weight: 700; color: var(--text-main);
            flex-shrink: 0; letter-spacing: -0.5px; line-height: 1;
        }
        .ts-stops-toggle {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px; border-radius: 7px; background: #1a1a1a;
            border: 1px solid #2a2a2a; cursor: pointer; margin-bottom: 6px;
            transition: background 0.12s; user-select: none;
        }
        .ts-stops-toggle:active { background: #222; }
        .ts-toggle-arrow {
            font-size: 0.6rem; color: var(--text-muted);
            transition: transform 0.2s; flex-shrink: 0;
        }
        .ts-stops-toggle.open .ts-toggle-arrow { transform: rotate(180deg); }
        .ts-stops-label { font-size: 0.74rem; color: var(--text-muted); flex: 1; }
        .ts-stops-list {
            display: none; flex-direction: column; gap: 4px;
            padding: 4px 0 6px 10px; border-left: 2px solid #2a2a2a; margin-bottom: 7px;
        }
        .ts-stops-list.open { display: flex; }
        .ts-stop-item { display: flex; align-items: center; gap: 7px; }
        .ts-stop-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid #444; }
        .ts-stop-name { font-size: 0.73rem; color: #888; }
        .ts-arrive-row {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .ts-arrive-name { font-size: 0.88rem; font-weight: 700; color: var(--text-main); }
        .ts-arrive-time { font-size: 0.88rem; font-weight: 600; color: var(--accent); flex-shrink: 0; }

        .step-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 26px; height: 26px; border-radius: 13px; padding: 0 6px;
            font-size: 0.65rem; font-weight: 800; color: white; margin-top: 2px;
        }
        .dest-step .sdot { background: #e53935; border: 2px solid #e53935; }

        body.detail-open #search-card {
            opacity: 0; pointer-events: none;
            transform: translateY(-8px);
            transition: opacity 0.2s, transform 0.2s;
        }
        #search-card { transition: opacity 0.2s, transform 0.2s; }

        .empty-msg { text-align: center; color: var(--text-muted); padding: 28px 20px; font-size: 0.9rem; line-height: 1.5; }
        .loading-msg {
            text-align: center; color: var(--text-muted); padding: 28px 20px; font-size: 0.88rem;
        }
        .loading-msg::before {
            content: ''; display: block; width: 22px; height: 22px;
            border: 2px solid #333; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.65s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #loc-picker {
            position: fixed;
            top: 0; left: 0; right: 0;
            bottom: var(--nav-h);
            background: var(--bg-dark);
            z-index: 500;
            display: flex; flex-direction: column;
            transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease;
        }
        #loc-picker.lp-hidden {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        #lp-header {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 14px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #lp-back {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            background: none; border: none; cursor: pointer;
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
        }
        #lp-back:active { background: var(--bg-hover); }

        #lp-input-wrap {
            flex: 1; display: flex; align-items: center;
            background: var(--bg-panel); border: 1.5px solid var(--border);
            border-radius: 12px; padding: 0 12px; gap: 8px;
        }
        #lp-input-wrap:focus-within { border-color: var(--accent); }
        #lp-input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 0.92rem; font-family: inherit;
            padding: 10px 0;
        }
        #lp-input::placeholder { color: var(--text-muted); }
        #lp-clear {
            background: none; border: none; cursor: pointer;
            color: #555; display: none; align-items: center;
            padding: 0; transition: color 0.15s; flex-shrink: 0;
        }
        #lp-clear.visible { display: flex; }
        #lp-clear:active { color: var(--text-main); }

        #lp-field-label {
            font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.6px; padding: 2px 8px;
            border-radius: 20px; flex-shrink: 0;
            background: rgba(0,210,255,0.1);
            color: var(--accent);
            border: 1px solid rgba(0,210,255,0.25);
        }

        .lp-divider { height: 1px; background: var(--border); margin: 4px 0; }

        .lp-loading-row {
            padding: 16px; text-align: center;
            font-size: 0.8rem; color: var(--text-muted);
        }
        .lp-loading-row::before {
            content: ''; display: inline-block; width: 14px; height: 14px;
            border: 2px solid #333; border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.65s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }

        #lp-body { flex: 1; overflow-y: auto; }
        #lp-body::-webkit-scrollbar { display: none; }

        .lp-section {
            display: flex; align-items: center; gap: 8px;
            padding: 12px 14px;
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        .lp-section::-webkit-scrollbar { display: none; }

        .lp-chip {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 0 13px 0 9px;
            height: 38px; border-radius: 19px;
            background: #232323; border: 1px solid var(--border);
            cursor: pointer; flex-shrink: 0;
            transition: background 0.12s, border-color 0.12s;
            user-select: none;
        }
        .lp-chip:active { background: #2e2e2e; }
        .lp-chip-icon {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .lp-chip-geo .lp-chip-icon { background: rgba(66,133,244,0.15); }
        .lp-chip-body { display: flex; flex-direction: column; }
        .lp-chip-label {
            font-size: 0.78rem; font-weight: 600; color: var(--text-main);
            white-space: nowrap; line-height: 1.2;
        }
        .lp-chip-sub {
            font-size: 0.64rem; color: var(--text-muted);
            white-space: nowrap; max-width: 100px;
            overflow: hidden; text-overflow: ellipsis;
        }
        .lp-chip-add {
            background: rgba(0,210,255,0.07);
            border-color: rgba(0,210,255,0.25);
            padding: 0 12px;
        }
        .lp-chip-add .lp-chip-label { color: var(--accent); font-size: 1.2rem; line-height: 1; }
        .lp-chip-edit {
            width: 16px; height: 16px; margin-left: 2px; flex-shrink: 0;
            opacity: 0.35; display: flex; align-items: center; justify-content: center;
        }

        .lp-section-title {
            font-size: 0.64rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.6px; color: var(--text-muted);
            padding: 14px 16px 4px;
        }

        .lp-result-item {
            display: flex; align-items: center; gap: 14px;

    <script>
    const _lineColors     = new Map();
    const _lineTextColors = new Map();
    const _routeIdToApiId   = new Map();
    const _shortNameToApiId = new Map();

    const _lineGeomCache = new Map();
    function fetchLineGeometry(apiId) {
        if (_lineGeomCache.has(apiId)) return _lineGeomCache.get(apiId);
        const p = fetch(
            `https://data.mobilites-m.fr/api/lines/json?codes=${encodeURIComponent(apiId)}`,
            { headers: { origin: 'ouestmontram' } }
        )
        .then(r => r.ok ? r.json() : null)
        .then(geojson => {
            if (!geojson || !geojson.features || !geojson.features.length) return null;
            const coords = [];
            for (const f of geojson.features) {
                const g = f.geometry;
                if (!g) continue;
                if (g.type === 'LineString') {
                    for (const c of g.coordinates) coords.push([c[1], c[0]]);
                } else if (g.type === 'MultiLineString') {
                    for (const line of g.coordinates)
                        for (const c of line) coords.push([c[1], c[0]]);
                }
            }
            return coords.length > 1 ? coords : null;
        })
        .catch(() => null);
        _lineGeomCache.set(apiId, p);
        return p;
    }

    const lineColor     = n => _lineColors.get(String(n))     || '#777777';
    const lineTextColor = n => _lineTextColors.get(String(n)) || '#ffffff';

    const _PRIORITY_OPERATORS = ['SEM','GSV','SE2','TPV'];

    let _routesPromise = null;
    function fetchAllRoutes() {
        if (!_routesPromise) {
            _routesPromise = fetch('https://data.mobilites-m.fr/api/routers/default/index/routes')
                .then(r => r.ok ? r.json() : [])
                .catch(() => []);
        }
        return _routesPromise;
    }

    function loadRouteColors() {
        return fetchAllRoutes().then(allRoutes => {
            _lineColors.set('TER', '#004da3');
            _lineTextColors.set('TER', '#ffffff');

            for (const route of allRoutes) {
                if (route.gtfsId && route.id) {
                    _routeIdToApiId.set(route.gtfsId, route.id);
                }
            }

            for (const op of _PRIORITY_OPERATORS) {
                for (const route of allRoutes) {
                    if (!route.shortName || !route.color) continue;
                    if (!route.id.startsWith(op + ':')) continue;
                    if (_lineColors.has(route.shortName)) continue;
                    _lineColors.set(route.shortName,     '#' + route.color);
                    _lineTextColors.set(route.shortName, route.textColor ? '#' + route.textColor : '#ffffff');
                    if (!_shortNameToApiId.has(route.shortName)) _shortNameToApiId.set(route.shortName, route.id);
                }
            }
            for (const route of allRoutes) {
                if (!route.shortName || !route.color) continue;
                if (_lineColors.has(route.shortName)) continue;
                _lineColors.set(route.shortName,     '#' + route.color);
                _lineTextColors.set(route.shortName, route.textColor ? '#' + route.textColor : '#ffffff');
                if (!_shortNameToApiId.has(route.shortName)) _shortNameToApiId.set(route.shortName, route.id);
            }
        });
    }
    function lineOrder(n) {
        const s = String(n).toUpperCase();
        const TRAMS = ['A','B','C','D','E'];
        const ti = TRAMS.indexOf(s);
        if (ti !== -1) return ti;
        if (/^C[1-8]$/.test(s)) return 10 + parseInt(s.slice(1));
        if (/^C(9|1[0-4])$/.test(s)) return 20 + parseInt(s.slice(1));
        const num = parseInt(s);
        if (!isNaN(num)) {
            if (num >= 15 && num <= 37) return 30 + num;
            if (num >= 80 && num <= 99) return 70 + num;
            if (num >= 38 && num <= 79) return 110 + num;
            if (num >= 500)             return 200 + (num - 500);
        }
        return 666;
    }
    function sortLines(lines) {
        return [...lines].sort((a, b) => lineOrder(a) - lineOrder(b));
    }

    const legName = leg => {
        if (leg.mode === 'RAIL' || (leg.agencyId && leg.agencyId.startsWith('SNC')))
            return 'TER';
        return leg.routeShortName || leg.route || '';
    };

    function decodePolyline(enc) {
        let i=0,lat=0,lng=0,res=[];
        while(i<enc.length){
            let sh=0,b,rb=0;
            do{b=enc.charCodeAt(i++)-63;rb|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
            lat+=(rb&1)?~(rb>>1):(rb>>1);sh=rb=0;
            do{b=enc.charCodeAt(i++)-63;rb|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
            lng+=(rb&1)?~(rb>>1):(rb>>1);
            res.push([lat/1e5,lng/1e5]);
        }
        return res;
    }

    function fmtTime(ms) {
        const d=new Date(ms);
        return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    }
    function fmtDur(s) {
        const m=Math.round(s/60);
        return m>=60 ? Math.floor(m/60)+'h'+String(m%60).padStart(2,'0') : m+' min';
    }
    function fmtDist(m) {
        return m<100 ? Math.round(m)+' m' : (Math.round(m/100)/10)+' km';
    }
    function fmtWait(startMs,firstMs) {
        const min=Math.round((firstMs-startMs)/60000);
        return min>1 ? ` · attente ${min} min` : '';
    }
    const APOS_RE = /['‘’‚‛`´]/g;
    function normalizeQuery(s) {
        return s.replace(APOS_RE, "'")
                .toLowerCase()
                .normalize('NFD').replace(/\p{Mn}/gu, '')
                .replace(/[-–—_]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
    }

    const cleanName = raw => {
        if(!raw) return '';
        const idx=raw.indexOf(',');
        return idx!==-1 ? raw.slice(idx+1).trim() : raw.trim();
    };

    function fmtBAN(feature) {
        const p = feature.properties;
        const name = p.name || p.label || '';
        const sub  = p.city || p.municipality || '';
        return {
            name: name.trim(),
            sub:  sub.trim(),
            lat:  feature.geometry.coordinates[1],
            lon:  feature.geometry.coordinates[0]
        };
    }

    function samplePolyline(coords, intervalM) {
        if(!coords||coords.length<2) return coords||[];
        const pts=[coords[0]];
        let acc=0, nextAt=intervalM;
        for(let i=1;i<coords.length;i++){
            const segLen=L.latLng(coords[i-1]).distanceTo(L.latLng(coords[i]));
            const segStart=acc;
            acc+=segLen;
            while(nextAt<=acc){
                const t=(nextAt-segStart)/segLen;
                pts.push([
                    coords[i-1][0]+t*(coords[i][0]-coords[i-1][0]),
                    coords[i-1][1]+t*(coords[i][1]-coords[i-1][1])
                ]);
                nextAt+=intervalM;
            }
        }
        return pts;
    }

    const _pool = [];

    const ITIN = {
        map: null,
        from: null, to: null,
        timeMode: 'now', customTime: null,
        activeField: null,
        rawItins: [], walkItins: [], sortedItins: [],
        travelMode: 'transit',
        sortMode: 'earliest',
        wheelchair: false,
        mapLayers: [], mapZoomHandlers: [],
        stops: [],
        searchTimer: null,
        overviewBounds: null,
        currentBounds: null,
        detailVisible: false,
        _planId: 0,

        init() {
            const setH = () => document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
            setH(); window.addEventListener('resize', setH);

            this.map = L.map('map', { center:[45.1885,5.7245], zoom:13, zoomControl:false, rotate:true, touchRotate:false, rotateControl:false, zoomSnap:0, zoomDelta:0.5 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution:'© <a href="https://www.openstreetmap.org/">OSM</a> © <a href="https://carto.com/">CARTO</a>',
                subdomains:'abcd', maxZoom:19
            }).addTo(this.map);
            L.control.zoom({ position:'bottomright' }).addTo(this.map);

            const updateLayersLive = () => {
                this.map.eachLayer(layer => {
                    if(layer._reset) layer._reset();
                    else if(layer._update) layer._update();
                    else if(layer.eachLayer) layer.eachLayer(l => {
                        if(l._reset) l._reset();
                        else if(l._update) l._update();
                    });
                });
            };
            this.map.on('rotate', () => {
                const bearing = this.map.getBearing ? this.map.getBearing() : 0;
                const btn = document.getElementById('compass-btn');
                const svg = document.getElementById('compass-svg');
                btn.classList.toggle('visible', Math.abs(bearing) > 1);
                if(svg) svg.style.transform = `rotate(${bearing}deg)`;
                updateLayersLive();
            });
            this.map.on('move', updateLayersLive);

            this._initSmartPinch();


            this.map.createPane('tramPane');
            this.map.getPane('tramPane').style.zIndex = '350';
            this.map.getPane('tramPane').style.pointerEvents = 'none';

            const iFrom = document.getElementById('input-from');
            const iTo   = document.getElementById('input-to');
            iFrom.addEventListener('click', () => ITIN.openPicker('from'));
            iTo.addEventListener('click',   () => ITIN.openPicker('to'));

            document.getElementById('lp-edit-input').addEventListener('keydown', e => { if(e.key==='Enter') ITIN.lpEditSearch(); });

            this.initSheetDrag();
            loadRouteColors();
            this.loadStops();
            this.startGPS();
            this._initBackButton();
        },

        _initBackButton() {
            history.pushState({ itinApp: 'app' }, '');

            let handling = false;
            window.addEventListener('popstate', () => {
                if (handling) return;
                handling = true;
                history.go(1);
                setTimeout(() => {
                    handling = false;
                    const lpEdit = document.getElementById('lp-edit-modal');
                    if (lpEdit && !lpEdit.classList.contains('lp-hidden')) { ITIN.lpCloseEdit(); return; }
                    const picker = document.getElementById('loc-picker');
                    if (picker && !picker.classList.contains('lp-hidden')) { ITIN.closePicker(); return; }
                    const popup = document.getElementById('opt-popup');
                    if (popup && popup.classList.contains('open')) { ITIN.closePopup(); return; }
                    if (ITIN.detailVisible) { ITIN.closeDetail(); return; }
                }, 50);
            });
        },

        _gpsMarker: null,
        _gpsWatchId: null,
        _gpsPos: null,

        startGPS() {
            if(!navigator.geolocation) return;

            const createMarker = (lat, lon) => {
                if(this._gpsMarker) { this._gpsMarker.setLatLng([lat, lon]); return; }
                const icon = L.divIcon({
                    className: '',
                    html: `<div class="gps-dot-wrap"><div class="gps-pulse"></div><div class="gps-dot"></div></div>`,
                    iconSize: [22, 22],
                    iconAnchor: [11, 11]
                });
                this._gpsMarker = L.marker([lat, lon], { icon, zIndexOffset: 900, interactive: false }).addTo(this.map);
            };

            navigator.geolocation.getCurrentPosition(
                pos => {
                    this._gpsPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    createMarker(this._gpsPos.lat, this._gpsPos.lon);
                    this.map.panTo([this._gpsPos.lat, this._gpsPos.lon], { animate: true });
                },
                () => {}, { enableHighAccuracy: true }
            );

            this._gpsWatchId = navigator.geolocation.watchPosition(
                pos => {
                    this._gpsPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    createMarker(this._gpsPos.lat, this._gpsPos.lon);
                },
                () => {},
                { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
            );
        },

        resetBearing() {
            if(this.map.setBearing) this.map.setBearing(0);
        },

        _initSmartPinch() {
            const ROTATE_THRESHOLD = 12;
            const ZOOM_LOCK_SCALE  = 0.18;

            const mapEl = this.map.getContainer();

            let t0 = null, t1 = null;
            let startAngle = 0, startDist = 0;
            let accumAngle = 0, accumScale = 0;
            let rotateUnlocked = false;
            let zoomLocked = false;
            let lastBearing = 0;
            let lastZoom = 0;

            const getAngle = (a, b) => Math.atan2(b.clientY - a.clientY, b.clientX - a.clientX) * 180 / Math.PI;
            const getDist  = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
            const angleDiff = (a, b) => { let d = a - b; while(d > 180) d -= 360; while(d < -180) d += 360; return d; };

            const onTouchStart = (e) => {
                if(e.touches.length === 2) {
                    t0 = e.touches[0];
                    t1 = e.touches[1];
                    startAngle   = getAngle(t0, t1);
                    startDist    = getDist(t0, t1);
                    accumAngle   = 0;
                    accumScale   = 0;
                    rotateUnlocked = false;
                    zoomLocked     = false;
                    lastBearing  = this.map.getBearing ? this.map.getBearing() : 0;
                    lastZoom     = this.map.getZoom();
                }
            };

            const onTouchMove = (e) => {
                if(e.touches.length !== 2) return;

                const a = e.touches[0];
                const b = e.touches[1];

                const curAngle = getAngle(a, b);
                const curDist  = getDist(a, b);

                const deltaAngle = angleDiff(curAngle, startAngle);
                const deltaScale = Math.abs(Math.log2(curDist / startDist));

                accumAngle = Math.abs(deltaAngle);
                accumScale = deltaScale;

                if(!rotateUnlocked && !zoomLocked) {
                    if(accumAngle >= ROTATE_THRESHOLD) {
                        rotateUnlocked = true;
                    } else if(accumScale >= ZOOM_LOCK_SCALE) {
                        zoomLocked = true;
                    }
                }

                if(rotateUnlocked) {
                    const newBearing = lastBearing + deltaAngle;
                    if(this.map.setBearing) this.map.setBearing(newBearing);
                }
            };

            const onTouchEnd = (e) => {
                if(e.touches.length < 2) {
                    t0 = t1 = null;
                    rotateUnlocked = false;
                    zoomLocked     = false;
                }
            };

            mapEl.addEventListener('touchstart', onTouchStart, { passive: true });
            mapEl.addEventListener('touchmove',  onTouchMove,  { passive: true });
            mapEl.addEventListener('touchend',   onTouchEnd,   { passive: true });
        },

        loadStops() {
            const STOP_OPERATORS = new Set(['SEM','GSV','SE2','TPV']);
            const m = new Map();
            fetchAllRoutes().then(allRoutes => {
                const routes = allRoutes
                    .filter(r => r.id && STOP_OPERATORS.has(r.id.split(':')[0]) && r.type !== 'SCOL')
                    .map(r => r.id);
                return Promise.all(routes.map(id =>
                    fetch(`https://data.mobilites-m.fr/api/routers/default/index/routes/${id}/clusters`)
                        .then(r => r.ok ? r.json() : [])
                        .then(data => {
                            const name = id.split(':')[1];
                            for(const s of data){
                                if(m.has(s.code)) m.get(s.code).lines.push(name);
                                else m.set(s.code, { name:s.name, lat:s.lat, lon:s.lon, lines:[name], type:'stop' });
                            }
                        }).catch(()=>{})
                ));
            }).then(()=>{
                const GRID = 0.0037;
                const grouped = new Map();
                for (const s of m.values()) {
                    const normName = normalizeQuery(s.name);
                    const gridLat  = Math.round(s.lat / GRID);
                    const gridLon  = Math.round(s.lon / GRID);
                    const key      = `${normName}|${gridLat}|${gridLon}`;
                    if (grouped.has(key)) {
                        const g = grouped.get(key);
                        for (const l of s.lines) {
                            if (!g.lines.includes(l)) g.lines.push(l);
                        }
                        g._count++;
                        g.lat += (s.lat - g.lat) / g._count;
                        g.lon += (s.lon - g.lon) / g._count;
                    } else {
                        grouped.set(key, { ...s, _count: 1 });
                    }
                }
                this.stops = Array.from(grouped.values());
            });
        },

        loadTramLines() {
            const TRAM_IDS = ['SEM:A','SEM:B','SEM:C','SEM:D','SEM:E'];
            TRAM_IDS.forEach(id => {
                const shortName = id.split(':')[1];
                fetch(`https://data.mobilites-m.fr/api/routers/default/index/routes/${id}/clusters`)
                    .then(r => r.ok ? r.json() : [])
                    .then(stops => {
                        if(!stops||stops.length<2) return;
                        const coords = stops.filter(s=>s.lat&&s.lon).map(s=>[s.lat,s.lon]);
                        if(coords.length<2) return;
                        const c = lineColor(shortName);
                        L.polyline(coords, { color:c, weight:4, opacity:0.35, pane:'tramPane' }).addTo(this.map);
                    }).catch(()=>{});
            });
        },

        pick(idx) { this.lpPick(idx); },

        _pickerField: null,
        _lpSearchTimer: null,
        _nomTimer: null,
        _photonTimer: null,
        _photonController: null,
        _editPhotonTimer: null,
        _editPhotonController: null,
        _geoCache: null,
        _lpBoundInput: null,

        openPicker(field) {
            this._pickerField = field;
            this._lpRefreshSaved();
            const picker = document.getElementById('loc-picker');
            const inp    = document.getElementById('lp-input');
            const lbl    = document.getElementById('lp-field-label');
            lbl.textContent = field === 'from' ? 'Départ' : 'Destination';
            picker.classList.remove('lp-hidden');
            const cur = field === 'from' ? this.from : this.to;
            inp.value = cur ? cur.name : '';
            this._lpUpdateClear(inp.value);
            this._lpRenderList(inp.value);
            if(!this._lpBoundInput) this._lpBoundInput = this._lpOnInput.bind(this);
            inp.removeEventListener('input', this._lpBoundInput);
            inp.addEventListener('input', this._lpBoundInput);
            setTimeout(()=>inp.focus(), 50);
        },

        closePicker() {
            document.getElementById('loc-picker').classList.add('lp-hidden');
            const inp = document.getElementById('lp-input');
            inp.value = '';
            if(this._lpBoundInput) inp.removeEventListener('input', this._lpBoundInput);
            this._pickerField = null;
            this._geoCache = null;
        },

        lpClear() {
            const inp = document.getElementById('lp-input');
            inp.value = '';
            inp.focus();
            this._lpUpdateClear('');
            this._lpRenderList('');
        },

        _lpUpdateClear(val) {
            document.getElementById('lp-clear').classList.toggle('visible', val.length > 0);
        },

        _lpOnInput(e) {
            this._lpUpdateClear(e.target.value);
            clearTimeout(this._lpSearchTimer);
            this._lpSearchTimer = setTimeout(()=>this._lpRenderList(e.target.value), 250);
        },

        _lpRenderList(q) {
            const title = document.getElementById('lp-section-title');
            const list  = document.getElementById('lp-list');
            const norm  = normalizeQuery(q.trim());

            if(!norm) {
                title.textContent = 'Récents';
                const hist = this.getHistory();
                if(!hist.length){
                    list.innerHTML = '<div style="padding:14px 16px;font-size:0.82rem;color:var(--text-muted)">Aucune recherche récente</div>';
                    return;
                }
                list.innerHTML = hist.map((p,i)=>this._lpHistItem(p,i)).join('');
                return;
            }

            title.textContent = 'Résultats';

            const tokens = norm.split(/\s+/).filter(Boolean);

            const fuzzyIncludes = (sn, tok) => {
                if(sn.includes(tok)) return true;
                if(tok.length <= 2) return false;
                const snWords = sn.split(/\s+/);
                for(const word of snWords) {
                    if(Math.abs(word.length - tok.length) > 2) continue;
                    const maxErr = tok.length <= 4 ? 1 : 2;
                    let err = 0;
                    const minLen = Math.min(tok.length, word.length);
                    for(let i = 0; i < minLen; i++) {
                        if(tok[i] !== word[i]) err++;
                        if(err > maxErr) break;
                    }
                    err += Math.abs(tok.length - word.length);
                    if(err <= maxErr) return true;
                    if(sn.length >= tok.length) {
                        for(let start = 0; start <= sn.length - tok.length; start++) {
                            let e = 0;
                            for(let i = 0; i < tok.length; i++) {
                                if(sn[start+i] !== tok[i]) e++;
                                if(e > 1) break;
                            }
                            if(e <= 1) return true;
                        }
                    }
                }
                return false;
            };

            const scoreStop = (sn) => {
                let score = 0;
                if(sn.includes(norm)) score -= 100;
                if(sn.startsWith(tokens[0])) score -= 50;
                const snWords = sn.split(/\s+/);
                if(snWords.some(w => w.startsWith(tokens[0]))) score -= 30;
                score += sn.length * 0.5;
                tokens.forEach(tok => { if(!sn.includes(tok)) score += 20; });
                return score;
            };

            const stopMatches = this.stops
                .filter(s => {
                    const sn = normalizeQuery(s.name);
                    return tokens.every(tok => tok.length >= 3 ? fuzzyIncludes(sn, tok) : sn.includes(tok));
                })
                .sort((a,b) => scoreStop(normalizeQuery(a.name)) - scoreStop(normalizeQuery(b.name)))
                .slice(0, 6);

            const searchQuery = q.trim();
            const searchNorm  = norm;

            list.innerHTML = `<div class="lp-loading-row" id="lp-geo-loading">Recherche…</div>`;

            const withinRadius = (lat, lon) => {
                const dLat = (lat - 45.1885) * 111;
                const dLon = (lon - 5.7245) * 111 * Math.cos(45.1885 * Math.PI / 180);
                return Math.sqrt(dLat*dLat + dLon*dLon) <= 40;
            };

            const pinSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`;

            const scoreItem = (p, q) => {
                const pn = normalizeQuery(p.name);
                const qn = normalizeQuery(q);
                let score = 0;
                if(pn === qn) score -= 200;
                else if(pn.startsWith(qn)) score -= 100;
                else if(pn.includes(qn)) score -= 50;
                else {
                    const toks = qn.split(/\s+/).filter(Boolean);
                    toks.forEach(t => { if(pn.includes(t)) score -= 15; });
                }
                if(p.type === 'stop') score -= 5;
                score += pn.length * 0.3;
                return score;
            };

            const renderMerged = (banResults, photonResults, fallbackOnly=false, appendPhoton=false) => {
                if(normalizeQuery(document.getElementById('lp-input').value.trim()) !== searchNorm) return;

                if(appendPhoton) {
                    const pending = list.querySelector('.lp-photon-pending');
                    if(pending) pending.remove();
                    const existingKeys = new Set(
                        [...list.querySelectorAll('[data-pkey]')].map(el => el.dataset.pkey)
                    );
                    const newItems = photonResults.filter(p => {
                        const k = normalizeQuery(p.name)+'|'+p.lat.toFixed(3)+'|'+p.lon.toFixed(3);
                        return !existingKeys.has(k);
                    }).slice(0, 4);
                    newItems.forEach((p, i) => {
                        const idx = 280+i;
                        _pool[idx] = p;
                        const k = normalizeQuery(p.name)+'|'+p.lat.toFixed(3)+'|'+p.lon.toFixed(3);
                        const el = document.createElement('div');
                        el.className = 'lp-result-item';
                        el.dataset.pkey = k;
                        el.setAttribute('onclick', `ITIN.lpPick(${idx})`);
                        el.innerHTML = `<div class="lp-ri-icon">${pinSvg}</div>
                            <div class="lp-ri-body">
                                <div class="lp-ri-name">${p.name}</div>
                                ${p.sub ? `<div class="lp-ri-sub">${p.sub}</div>` : ''}
                            </div>`;
                        list.appendChild(el);
                    });
                    return;
                }

                const seen = new Set();
                const geoItems = [...photonResults, ...banResults].filter(p => {
                    const k = normalizeQuery(p.name) + '|' + p.lat.toFixed(3) + '|' + p.lon.toFixed(3);
                    if(seen.has(k)) return false;
                    seen.add(k);
                    return true;
                });

                const allItems = [...stopMatches, ...geoItems];
                const seenAll = new Set();
                const sorted = allItems
                    .filter(p => {
                        const k = normalizeQuery(p.name) + '|' + p.lat.toFixed(3) + '|' + p.lon.toFixed(3);
                        if(seenAll.has(k)) return false;
                        seenAll.add(k);
                        return true;
                    })
                    .sort((a, b) => scoreItem(a, searchQuery) - scoreItem(b, searchQuery))
                    .slice(0, 8);

                const html = sorted.map((p, i) => {
                    const k = normalizeQuery(p.name)+'|'+p.lat.toFixed(3)+'|'+p.lon.toFixed(3);
                    _pool[200+i] = p;
                    if(p.type === 'stop') {
                        const el = this._lpStopItem(p, 200+i);
                        return el.replace('<div class="lp-result-item"', `<div class="lp-result-item" data-pkey="${k}"`);
                    }
                    return `<div class="lp-result-item" data-pkey="${k}" onclick="ITIN.lpPick(${200+i})">
                        <div class="lp-ri-icon">${pinSvg}</div>
                        <div class="lp-ri-body">
                            <div class="lp-ri-name">${p.name}</div>
                            ${p.sub ? `<div class="lp-ri-sub">${p.sub}</div>` : ''}
                        </div>
                    </div>`;
                }).join('');

                const pendingHtml = fallbackOnly
                    ? `<div class="lp-photon-pending" style="padding:8px 14px;font-size:0.75rem;color:var(--text-muted);display:flex;align-items:center;gap:7px"><span style="display:inline-block;width:10px;height:10px;border:1.5px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.65s linear infinite;flex-shrink:0"></span>Recherche de lieux…</div>`
                    : '';

                list.innerHTML = html + pendingHtml;
            };

            let _banResults = [];
            let _photonResults = [];
            let _banDone = false;
            let _photonDone = false;
            let _fallbackShown = false;

            const fallbackTimer = setTimeout(() => {
                if(_photonDone) return;
                _fallbackShown = true;
                renderMerged(_banResults, [], true);
            }, 3000);

            const checkDone = () => {
                if(_banDone && _photonDone) {
                    clearTimeout(fallbackTimer);
                    renderMerged(_banResults, _photonResults, false, _fallbackShown);
                }
            };

            const banUrl = `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(searchQuery)}&limit=4&lat=45.1885&lon=5.7245`;
            fetch(banUrl).then(r=>r.json()).then(data => {
                if(normalizeQuery(document.getElementById('lp-input').value.trim()) !== searchNorm) return;
                _banResults = (data.features||[])
                    .filter(f => withinRadius(f.geometry.coordinates[1], f.geometry.coordinates[0]))
                    .map(f => { const {name,sub,lat,lon} = fmtBAN(f); return {name,sub,lat,lon,type:'address'}; });
                _banDone = true;
                checkDone();
            }).catch(()=>{ _banDone = true; checkDone(); });

            clearTimeout(this._photonTimer);
            if(this._photonController) this._photonController.abort();
            this._photonController = new AbortController();
            const photonSignal = this._photonController.signal;
            this._photonTimer = setTimeout(() => {
                if(normalizeQuery(document.getElementById('lp-input').value.trim()) !== searchNorm) return;
                const photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(searchQuery)}&lat=45.1885&lon=5.7245&limit=6&lang=fr&bbox=5.20,44.83,6.23,45.55`;
                fetch(photonUrl, {signal: photonSignal}).then(r=>r.json()).then(data => {
                    if(normalizeQuery(document.getElementById('lp-input').value.trim()) !== searchNorm) return;
                    const TRANSIT_TAGS = new Set(['bus_stop','tram_stop','stop_position','halt','station']);
                    _photonResults = (data.features||[])
                        .filter(f => {
                            const [lon,lat] = f.geometry.coordinates;
                            if(!withinRadius(lat,lon)) return false;
                            return !TRANSIT_TAGS.has(f.properties?.osm_value);
                        })
                        .map(f => {
                            const p = f.properties||{};
                            const name = p.name || p.street || p.city || '';
                            if(!name) return null;
                            const parts = [p.street, p.city||p.town||p.village].filter(Boolean);
                            const sub = parts.join(', ');
                            const [lon, lat] = f.geometry.coordinates;
                            return {name, sub, lat, lon, type:'poi'};
                        })
                        .filter(Boolean);
                    _photonDone = true;
                    checkDone();
                }).catch(e=>{ if(e.name==='AbortError') return; _photonDone = true; checkDone(); });
            }, 200);
        },

        _lpApply(place) {
            this.saveHist(place);
            if(this._pickerField === 'from'){
                this.from = place;
                document.getElementById('input-from').value = place.name;
            } else {
                this.to = place;
                document.getElementById('input-to').value = place.name;
            }
            this.closePicker();
            if(this.from && this.to) {
                this._clearFromPreview();
                this.plan();
            } else if(this.from && !this.to) {
                this._clearFromPreview();
                this._fromPreviewMarker = L.circleMarker([this.from.lat, this.from.lon], {
                    radius: 7, color: '#555', fillColor: '#888', fillOpacity: 1, weight: 2
                }).addTo(this.map);
                setTimeout(() => { this.map.invalidateSize(); this.map.setView([this.from.lat, this.from.lon], 15, { animate: true }); }, 310);
            }
        },

        lpGeolocate() {
            if(!navigator.geolocation) return;
            if(this._gpsPos) {
                this._lpApply({ name:'Ma position', lat:this._gpsPos.lat, lon:this._gpsPos.lon, type:'geo' });
                this.map.setView([this._gpsPos.lat, this._gpsPos.lon], 14);
                return;
            }
            const item = document.querySelector('#loc-picker .lp-chip-geo');
            item && (item.style.opacity='0.5');
            navigator.geolocation.getCurrentPosition(
                pos => {
                    item && (item.style.opacity='');
                    this._gpsPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    this._lpApply({ name:'Ma position', lat:pos.coords.latitude, lon:pos.coords.longitude, type:'geo' });
                    this.map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                },
                () => { item && (item.style.opacity=''); }
            );
        },
