        lpEditSearch() {
            const q = document.getElementById('lp-edit-input').value.trim();
            if(!q) return;
            const norm = normalizeQuery(q);
            const sug  = document.getElementById('lp-edit-suggestions');

            sug.innerHTML = '<div class="lp-loading-row" id="lp-edit-geo-loading" style="margin:0;padding:10px 0">Recherche…</div>';

            const withinRadius = (lat, lon) => {
                const dLat = (lat - 45.1885) * 111;
                const dLon = (lon - 5.7245) * 111 * Math.cos(45.1885 * Math.PI / 180);
                return Math.sqrt(dLat*dLat + dLon*dLon) <= 40;
            };

            const scoreItem = (p) => {
                const pn = normalizeQuery(p.name);
                let score = 0;
                if(pn === norm) score -= 200;
                else if(pn.startsWith(norm)) score -= 100;
                else if(pn.includes(norm)) score -= 50;
                score += pn.length * 0.3;
                return score;
            };

            const editTokens = norm.split(/\s+/).filter(Boolean);
            const stopMatches = this.stops.filter(s => {
                const sn = normalizeQuery(s.name);
                return editTokens.every(tok => sn.includes(tok));
            }).sort((a,b) => scoreItem(a) - scoreItem(b)).slice(0, 4);

            const renderEditResults = (banResults, photonResults) => {
                const seen = new Set();
                const TRANSIT_TAGS = new Set(['bus_stop','tram_stop','stop_position','halt','station']);
                const geoItems = [...photonResults, ...banResults].filter(p => {
                    if(p._photonTag && TRANSIT_TAGS.has(p._photonTag)) return false;
                    const k = normalizeQuery(p.name) + '|' + p.lat.toFixed(3) + '|' + p.lon.toFixed(3);
                    if(seen.has(k)) return false;
                    seen.add(k);
                    return true;
                });

                const allItems = [...stopMatches, ...geoItems];
                const seenAll = new Set();
                const sorted = allItems
                    .filter(p => {
                        const k = normalizeQuery(p.name) + '|' + p.lat.toFixed(3) + '|' + p.lon.toFixed(3);
                        if(seenAll.has(k)) return false;
                        seenAll.add(k);
                        return true;
                    })
                    .sort((a, b) => scoreItem(a) - scoreItem(b))
                    .slice(0, 6);

                if(!sorted.length) {
                    sug.innerHTML = '<div style="font-size:0.8rem;color:var(--text-muted);padding:8px 0">Aucun résultat</div>';
                    return;
                }

                sorted.forEach((p, i) => { _pool[50+i] = p; });
                sug.innerHTML = sorted.map((p, i) => {
                    const dot = p.type === 'stop'
                        ? `<div class="lp-edit-sug-dot"></div>`
                        : `<div class="lp-edit-sug-dot" style="background:#4285F4"></div>`;
                    return `<div class="lp-edit-sug" onclick="ITIN._lpSavePicked(${50+i})">
                        ${dot}
                        <div>
                            <div class="lp-edit-sug-name">${p.name}</div>
                            ${p.sub ? `<div class="lp-edit-sug-sub">${p.sub}</div>` : ''}
                        </div>
                    </div>`;
                }).join('');
            };

            let _banResults = [], _photonResults = [];
            let _banDone = false, _photonDone = false;
            const checkDone = () => { if(_banDone && _photonDone) renderEditResults(_banResults, _photonResults); };

            fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=4&lat=45.1885&lon=5.7245`)
                .then(r=>r.json())
                .then(data=>{
                    _banResults = (data.features||[])
                        .filter(f => withinRadius(f.geometry.coordinates[1], f.geometry.coordinates[0]))
                        .map(f => { const {name,sub,lat,lon} = fmtBAN(f); return {name,sub,lat,lon,type:'address'}; });
                    _banDone = true; checkDone();
                }).catch(()=>{ _banDone = true; checkDone(); });

            clearTimeout(this._editPhotonTimer);
            if(this._editPhotonController) this._editPhotonController.abort();
            this._editPhotonController = new AbortController();
            const editSignal = this._editPhotonController.signal;
            this._editPhotonTimer = setTimeout(() => {
                const photonUrl = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&lat=45.1885&lon=5.7245&limit=6&lang=fr&bbox=5.20,44.83,6.23,45.55`;
                fetch(photonUrl, {signal: editSignal}).then(r=>r.json()).then(data=>{
                    const TRANSIT_TAGS = new Set(['bus_stop','tram_stop','stop_position','halt','station']);
                    _photonResults = (data.features||[])
                        .filter(f => {
                            const [lon,lat] = f.geometry.coordinates;
                            if(!withinRadius(lat,lon)) return false;
                            const tag = f.properties?.osm_value;
                            return !TRANSIT_TAGS.has(tag);
                        })
                        .map(f => {
                            const p = f.properties||{};
                            const name = p.name || p.street || p.city || '';
                            if(!name) return null;
                            const parts = [p.street, p.city||p.town||p.village].filter(Boolean);
                            const sub = parts.join(', ');
                            const [lon,lat] = f.geometry.coordinates;
                            return {name, sub, lat, lon, type:'poi', _photonTag: p.osm_value};
                        })
                        .filter(Boolean);
                    _photonDone = true; checkDone();
                }).catch(e=>{ if(e.name==='AbortError') return; _photonDone = true; checkDone(); });
            }, 200);
        },

        _lpSavePicked(idx) {
            const p = _pool[idx];
            if(!p) return;

            if(this._lpEditKey) {
                this.setSaved(this._lpEditKey, p);
            } else if(this._lpEditCustomIdx === -1) {
                const label = document.getElementById('lp-edit-name-input').value.trim() || p.name.split(' ')[0];
                const favs  = this.getCustomFavs();
                favs.push({ id: Date.now(), label, place: p });
                this.setCustomFavs(favs);
            } else if(this._lpEditCustomIdx >= 0) {
                const label = document.getElementById('lp-edit-name-input').value.trim();
                const favs  = this.getCustomFavs();
                if(favs[this._lpEditCustomIdx]) {
                    if(label) favs[this._lpEditCustomIdx].label = label;
                    favs[this._lpEditCustomIdx].place = p;
                    this.setCustomFavs(favs);
                }
            }

            this.lpCloseEdit();
            this._lpRenderChips();
        },

        swap() {
            [this.from,this.to]=[this.to,this.from];
            document.getElementById('input-from').value = this.from ? this.from.name : '';
            document.getElementById('input-to').value   = this.to   ? this.to.name   : '';
            if(this.from && this.to) this.plan();
        },

        _currentPopup: null,

        _positionPopup() {
            const popup  = document.getElementById('opt-popup');
            const sheet  = document.getElementById('bottom-sheet');
            const navH   = 60;
            const sheetTop = sheet.getBoundingClientRect().top;
            const gap    = 10;
            let bottom   = window.innerHeight - sheetTop + gap;
            const sf     = document.getElementById('search-float');
            const sfBottom = sf ? sf.getBoundingClientRect().bottom : 0;
            const popH   = popup.offsetHeight;
            const maxBottom = window.innerHeight - sfBottom - popH - 8;
            bottom = Math.min(bottom, maxBottom);
            popup.style.bottom = Math.max(navH + 8, bottom) + 'px';
        },

        openPopup(type) {
            if(this._currentPopup === type){ this.closePopup(); return; }
            this._currentPopup = type;
            const popup    = document.getElementById('opt-popup');
            const backdrop = document.getElementById('opt-backdrop');
            const body     = document.getElementById('popup-body');
            const title    = document.getElementById('popup-title');
            const timeWrap = document.getElementById('pop-time-input-wrap');
            const confirmBtn = document.getElementById('pop-confirm-btn');
            timeWrap.classList.remove('show');
            confirmBtn.classList.remove('show');

            document.querySelectorAll('.opt-chip').forEach(c=>c.classList.remove('popup-open'));
            const chip = document.getElementById('chip-'+type);
            if(chip) chip.classList.add('popup-open');

            const checkIcon = `<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>`;

            const optRow = (val, label, sub, sel, handler) =>
                `<div class="pop-opt ${sel?'selected':''}" onclick="ITIN.${handler}('${val}')">
                    <div class="pop-opt-body">
                        <div class="pop-opt-label">${label}</div>
                        <div class="pop-opt-sub">${sub}</div>
                    </div>
                    <div class="pop-check">${checkIcon}</div>
                </div>`;

            if(type==='mode'){
                title.textContent = 'Mode de déplacement';
                body.innerHTML = [
                    ['transit','Transports en commun','Tram, bus, train…'],
                    ['walk',   'À pied',              'Itinéraire piéton uniquement'],
                    ['bicycle','Vélo',                'Itinéraire cyclable'],
                ].map(([val,l,s])=>optRow(val,l,s,this.travelMode===val,'_pickMode')).join('');

            } else if(type==='time'){
                title.textContent = 'Date & Heure';
                body.innerHTML = [
                    ['now',    'Maintenant', 'Prochain départ disponible'],
                    ['depart', 'Départ à…',  'Choisir l\'heure de départ'],
                    ['arrive', 'Arrivée à…', 'Choisir l\'heure d\'arrivée'],
                ].map(([val,l,s])=>optRow(val,l,s,this.timeMode===val,'_pickTimeMode')).join('');
                if(this.timeMode!=='now') this._showTimeInput();

            } else if(type==='sort'){
                title.textContent = 'Trier les résultats';
                body.innerHTML = [
                    ['earliest', 'Par heure d\'arrivée',     'Heure d\'arrivée la plus proche'],
                    ['fastest',  'Par durée',          'Durée totale minimale'],
                    ['lessWalk', 'Moins de marche',         'Distance à pied minimale'],
                ].map(([val,l,s])=>optRow(val,l,s,this.sortMode===val,'_pickSort')).join('');
            }

            backdrop.classList.add('open');
            popup.classList.add('open');
            requestAnimationFrame(()=>{ this._positionPopup(); });
        },

        _showTimeInput() {
            const timeWrap   = document.getElementById('pop-time-input-wrap');
            const confirmBtn = document.getElementById('pop-confirm-btn');
            const label      = document.getElementById('pop-time-label');
            label.textContent = this.timeMode==='arrive' ? 'Heure d\'arrivée' : 'Heure de départ';
            const inp = document.getElementById('custom-time-input');
            if(!inp.value || !this.customTime){
                const now = new Date(); now.setMinutes(now.getMinutes()+5);
                inp.value = new Date(now - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
            }
            timeWrap.classList.add('show');
            confirmBtn.classList.add('show');
            requestAnimationFrame(()=>{ this._positionPopup(); });
        },

        closePopup() {
            document.getElementById('opt-popup').classList.remove('open');
            document.getElementById('opt-backdrop').classList.remove('open');
            document.querySelectorAll('.opt-chip').forEach(c=>c.classList.remove('popup-open'));
            this._currentPopup = null;
        },


        _pickMode(mode) {
            this.closePopup();
            this.setTravelMode(mode);
        },

        _pickTimeMode(mode) {
            document.querySelectorAll('#popup-body .pop-opt').forEach(o=>{
                const sel = o.getAttribute('onclick').includes(`'${mode}'`);
                o.classList.toggle('selected', sel);
            });
            this.timeMode = mode;
            const timeWrap   = document.getElementById('pop-time-input-wrap');
            const confirmBtn = document.getElementById('pop-confirm-btn');
            if(mode==='now'){
                timeWrap.classList.remove('show');
                confirmBtn.classList.remove('show');
                this.customTime = null;
                document.getElementById('chip-time-label').textContent = 'Maintenant';
                document.getElementById('chip-time').classList.remove('active');
                this.closePopup();
                if(this.from && this.to) this.plan();
            } else {
                this._showTimeInput();
            }
        },

        _pickSort(mode) {
            this.closePopup();
            this.setSort(mode);
        },

        setTravelMode(mode) {
            this.travelMode = mode;
            const labels = { transit:'Transports', walk:'À pied', bicycle:'Vélo' };
            document.getElementById('chip-mode-label').textContent = labels[mode]||mode;
            document.getElementById('chip-mode').classList.add('active');
            this.rawItins  = [];
            this.walkItins = [];
            this.sortedItins = [];
            document.getElementById('chip-sort').style.display = 'none';
            document.getElementById('sep-sort').style.display  = 'none';
            if(this.from && this.to) this.plan();
        },

        toggleWheelchair() {
            this.wheelchair = !this.wheelchair;
            const chip = document.getElementById('chip-wheelchair');
            chip.classList.toggle('active', this.wheelchair);
            if(this.from && this.to) this.plan();
        },

        setSort(mode) {            this.sortMode = mode;
            const labels = { fastest:'Rapide', earliest:'Arrivée tôt', lessWalk:'Moins de marche' };
            document.getElementById('chip-sort-label').textContent = labels[mode]||mode;
            this.applySort();
            this.renderResults();
            if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]);
        },

        applySort() {
            const src = this.travelMode==='walk' ? this.walkItins : this.rawItins;
            const arr = [...src];
            if(this.sortMode==='lessWalk') arr.sort((a,b)=>a.walkDistance-b.walkDistance);
            else if(this.sortMode==='earliest') arr.sort((a,b)=>a.endTime-b.endTime);
            else arr.sort((a,b)=>a.duration-b.duration);
            this.sortedItins = arr;
        },

        _fmtTimeChip(ms) {
            const dt = new Date(ms);
            const now = new Date();
            const isToday = dt.toDateString() === now.toDateString();
            const isTomorrow = dt.toDateString() === new Date(now.getTime()+86400000).toDateString();
            const timeStr = fmtTime(ms);
            if(isToday) return timeStr;
            if(isTomorrow) return `Dem. ${timeStr}`;
            return `${dt.getDate()}/${dt.getMonth()+1} ${timeStr}`;
        },

        setTimeMode(mode) {
            this.timeMode = mode;
        },

        onTimeChange(val) {
            this.customTime = val;
            if(val){
                const ms = new Date(val).getTime();
                const prefix = this.timeMode==='arrive' ? 'Arr.' : 'Dép.';
                document.getElementById('chip-time-label').textContent = `${prefix} ${this._fmtTimeChip(ms)}`;
                document.getElementById('chip-time').classList.add('active');
            }
        },

        confirmTime() {
            const val = document.getElementById('custom-time-input').value;
            if(val){
                this.customTime = val;
                const ms = new Date(val).getTime();
                const prefix = this.timeMode==='arrive' ? 'Arr.' : 'Dép.';
                document.getElementById('chip-time-label').textContent = `${prefix} ${this._fmtTimeChip(ms)}`;
                document.getElementById('chip-time').classList.add('active');
            }
            this.closePopup();
            if(this.from && this.to) this.plan();
        },

        refresh() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('spinning');
            btn.addEventListener('animationend', ()=>btn.classList.remove('spinning'), {once:true});
            if(this.from && this.to) this.plan();
        },

        buildUrl(mode) {
            let url = `https://data.mobilites-m.fr/api/routers/default/plan?fromPlace=${this.from.lat},${this.from.lon}&toPlace=${this.to.lat},${this.to.lon}&numItineraries=5&mode=${mode}&showIntermediateStops=true&bannedAgencies=MCO:MCO&walkReluctance=10&transferPenalty=60`;
            if(this.wheelchair) url += `&wheelchair=true`;
            if(this.customTime){
                const dt=new Date(this.customTime);
                const pad=n=>String(n).padStart(2,'0');
                url+=`&date=${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}&time=${pad(dt.getHours())}:${pad(dt.getMinutes())}&arriveBy=${this.timeMode==='arrive'}`;
            }
            return url;
        },

        async plan() {
            if(!this.from||!this.to) return;
            const planId = ++this._planId;
            this.showResultsPanel();
            const list = document.getElementById('results-list');
            list.innerHTML = '<div class="loading-msg">Calcul en cours…</div>';
            this.snapSheet(0.40);
            this.clearRoute();

            try {
                let rawItins = [], walkItins = [];

                if(this.travelMode === 'transit') {
                    const res = await fetch(this.buildUrl('TRANSIT'), {headers:{origin:'ouestmontram'}});
                    if(planId !== this._planId) return;
                    const data = res.ok ? await res.json() : null;
                    if(planId !== this._planId) return;
                    rawItins = (data&&data.plan&&data.plan.itineraries)
                        ? data.plan.itineraries.filter(it=>it.legs.some(l=>l.mode!=='WALK'))
                        : [];
                } else if(this.travelMode === 'walk') {
                    const res = await fetch(this.buildUrl('WALK'), {headers:{origin:'ouestmontram'}});
                    if(planId !== this._planId) return;
                    const data = res.ok ? await res.json() : null;
                    if(planId !== this._planId) return;
                    walkItins = (data&&data.plan&&data.plan.itineraries) ? data.plan.itineraries : [];
                } else if(this.travelMode === 'bicycle') {
                    const res = await fetch(this.buildUrl('BICYCLE'), {headers:{origin:'ouestmontram'}});
                    if(planId !== this._planId) return;
                    const data = res.ok ? await res.json() : null;
                    if(planId !== this._planId) return;
                    rawItins = (data&&data.plan&&data.plan.itineraries) ? data.plan.itineraries : [];
                }

                this.rawItins  = rawItins;
                this.walkItins = walkItins;
                this.applySort();

                const sortChip = document.getElementById('chip-sort');
                const sortSep  = document.getElementById('sep-sort');
                const showSort = this.travelMode==='transit' && this.sortedItins.length>1;
                sortChip.style.display = showSort ? 'inline-flex' : 'none';
                sortSep.style.display  = showSort ? 'block' : 'none';

                this.renderResults();
                if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]);
            } catch(e) {
                if(planId !== this._planId) return;
                list.innerHTML = `<div class="empty-msg">Erreur lors du calcul.<br><small style="color:#555">${e.message}</small></div>`;
            }
        },

        renderResults() {
            const list = document.getElementById('results-list');
            if(!this.sortedItins.length){
                list.innerHTML='<div class="empty-msg">Aucun itinéraire trouvé.<br>Essayez un autre mode de déplacement.</div>';
                return;
            }
            const isBike = this.travelMode === 'bicycle';
            list.innerHTML = this.sortedItins.map((itin,i)=>{
                let jbar='';
                itin.legs.forEach((leg)=>{
                    if(leg.mode==='WALK'){
                        if(!isBike && leg.distance >= 250){
                            if(jbar.length) jbar+=`<span class="jb-arrow">›</span>`;
                            jbar+=`<span class="jb-walk-icon">🚶‍➡️</span>`;
                        }
                    } else if(leg.mode==='BICYCLE'){
                        jbar+=`<span class="jb-walk-icon">🚲</span>`;
                    } else {
                        const n=legName(leg);
                        const c=lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#777');
                        const tc=lineTextColor(n);
                        if(jbar.length) jbar+=`<span class="jb-arrow">›</span>`;
                        jbar+=`<div class="jb-badge" style="background:${c};color:${tc}">${n}</div>`;
                    }
                });

                const footItems=[];
                if(isBike){
                    const bikeDist = itin.legs.reduce((s,l)=>l.mode==='BICYCLE'?s+l.distance:s, 0);
                    if(bikeDist>0) footItems.push(`${fmtDist(bikeDist)} à vélo`);
                } else {
                    if(itin.transfers>0) footItems.push(`${itin.transfers} correspondance${itin.transfers>1?'s':''}`);
                    if(itin.walkDistance>100) footItems.push(`${fmtDist(itin.walkDistance)} à pied`);
                }

                return `<div class="rcard" onclick="ITIN.showDetail(${i})">
                    <div class="rc-top">
                        <div>
                            <div class="rc-times">${fmtTime(itin.startTime)} – ${fmtTime(itin.endTime)}</div>
                            <div class="rc-dur">${fmtDur(itin.duration)}</div>
                        </div>
                    </div>
                    <div class="jbar">${jbar}</div>
                    ${footItems.length ? `<div class="rc-foot">${footItems.map(s=>`<span>${s}</span>`).join('')}</div>` : ''}
                </div>`;
            }).join('');
        },

        getVisiblePadding() {
            const sf = document.getElementById('search-float');
            const sh = document.getElementById('bottom-sheet');
            return {
                top:    (sf ? sf.offsetHeight : 0) + 16,
                bottom: (sh ? sh.offsetHeight : 0) + 16
            };
        },

        fitBounds(bounds, opts={}) {
            if(!bounds||!this.map) return;
            const p = this.getVisiblePadding();
            this.map.fitBounds(bounds, {
                paddingTopLeft:     [36, p.top + 20],
                paddingBottomRight: [36, p.bottom + 20],
                maxZoom: opts.maxZoom || 15.5,
                animate: true, duration: 0.5
            });
        },

        clearRoute() {
            this._clearFromPreview();
            this.mapZoomHandlers.forEach(h => {
                this.map.off('zoomend', h);
                this.map.off('zoom', h);
            });
            this.mapZoomHandlers=[];
            this.mapLayers.forEach(l=>{ if(this.map.hasLayer(l)) this.map.removeLayer(l); });
            this.mapLayers=[];
        },

        addStopMarkers(leg, shownNames) {
            const n=legName(leg);
            const c=lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#888');
            const allStops=[];
            if(leg.from&&leg.from.lat!=null) allStops.push({name:leg.from.name,lat:leg.from.lat,lon:leg.from.lon,key:true});
            (leg.intermediateStops||[]).forEach(s=>{ if(s.lat!=null) allStops.push({name:s.name,lat:s.lat,lon:s.lon,key:false}); });
            if(leg.to&&leg.to.lat!=null) allStops.push({name:leg.to.name,lat:leg.to.lat,lon:leg.to.lon,key:true});

            const dotGroup      = L.layerGroup().addTo(this.map);
            const keyLabelGroup = L.layerGroup();
            const allLabelGroup = L.layerGroup();

            allStops.forEach(s=>{
                L.circleMarker([s.lat,s.lon],{
                    radius:3.5, color:c, fillColor:'#fff', fillOpacity:1, weight:2
                }).addTo(dotGroup);

                const label = cleanName(s.name);
                if(shownNames.has(label)) return;
                shownNames.add(label);

                const tooltip = L.tooltip({ permanent:true, direction:'right', offset:[6,0], opacity:1, className:'stop-tooltip' })
                    .setContent(label).setLatLng([s.lat,s.lon]);

                if(s.key) tooltip.addTo(keyLabelGroup);
                else      tooltip.addTo(allLabelGroup);
            });

            const updateLabels = () => {
                const z = this.map.getZoom();
                if(z >= 14) keyLabelGroup.addTo(this.map);
                else if(this.map.hasLayer(keyLabelGroup)) this.map.removeLayer(keyLabelGroup);
                if(z >= 15) allLabelGroup.addTo(this.map);
                else if(this.map.hasLayer(allLabelGroup)) this.map.removeLayer(allLabelGroup);
            };
            this.map.on('zoom', updateLabels);
            this.map.on('zoomend', updateLabels);
            updateLabels();
            this.mapLayers.push(dotGroup, keyLabelGroup, allLabelGroup);
            this.mapZoomHandlers.push(updateLabels);
        },

        drawWalkDots(coords) {
            const intervalForZoom = () => {
                const z = this.map.getZoom();
                if(z >= 17.5) return 5;
                if(z >= 17) return 10;
                if(z >= 16.5) return 20;
                if(z >= 16) return 30;
                if(z >= 15.5) return 40;
                if(z >= 15) return 50;
                if(z >= 14) return 75;
                if(z >= 13) return 100;
                return 200;
            };

            const layer = L.layerGroup().addTo(this.map);
            const redraw = () => {
                layer.clearLayers();
                samplePolyline(coords, intervalForZoom()).forEach(pt=>{
                    L.circleMarker(pt,{
                        radius:2.5, color:'#4285F4', fillColor:'#4285F4',
                        fillOpacity:1, weight:0
                    }).addTo(layer);
                });
            };
            redraw();
            this.map.on('zoom', redraw);
            this.map.on('zoomend', redraw);
            this.mapZoomHandlers.push(redraw);
            this.mapLayers.push(layer);
        },

        _tripGeoCache: new Map(),

        _resolveStopPts(leg) {
            const pts = [];
            if (leg.from && leg.from.lat != null) pts.push([leg.from.lat, leg.from.lon]);
            (leg.intermediateStops || []).forEach(s => { if (s.lat != null) pts.push([s.lat, s.lon]); });
            if (leg.to && leg.to.lat != null) pts.push([leg.to.lat, leg.to.lon]);
            return pts;
        },

        _resolveCoords(leg) {
            const stopPts = this._resolveStopPts(leg);
            if (leg.legGeometry && leg.legGeometry.points) {
                const geomPts = decodePolyline(leg.legGeometry.points);
                if (geomPts.length > stopPts.length) return geomPts;
            }
            return stopPts;
        },

        async _fetchTripGeometry(tripId) {
            if (this._tripGeoCache.has(tripId)) return this._tripGeoCache.get(tripId);
            try {
                const r = await fetch(
                    `https://data.mobilites-m.fr/api/routers/default/index/trips/${encodeURIComponent(tripId)}/geometry`,
                    { headers: { origin: 'ouestmontram' } }
                );
                if (!r.ok) { this._tripGeoCache.set(tripId, null); return null; }
                const data = await r.json();
                const pts = (data && data.points) ? decodePolyline(data.points) : null;
                this._tripGeoCache.set(tripId, pts);
                return pts;
            } catch { this._tripGeoCache.set(tripId, null); return null; }
        },

        async drawRoute(itin) {
            this.clearRoute();
            const bounds=[];

            const legCoords = await Promise.all(itin.legs.map(async leg => {
                const stopPts = this._resolveStopPts(leg);
                const geomPts = (leg.legGeometry && leg.legGeometry.points)
                    ? decodePolyline(leg.legGeometry.points) : [];

                if (geomPts.length > stopPts.length) return geomPts;

                if (leg.mode !== 'WALK' && leg.mode !== 'BICYCLE') {
                    const apiId = _routeIdToApiId.get(leg.routeId)
                               || _shortNameToApiId.get(leg.routeShortName);
                    if (apiId) {
                        const linePts = await fetchLineGeometry(apiId);
                        if (linePts && linePts.length > stopPts.length) return linePts;
                    }
                }

                return stopPts.length ? stopPts : geomPts;
            }));

            const shownNames = new Set();
            itin.legs.forEach((leg, i) => {
                const coords = legCoords[i];
                if (!coords || !coords.length) return;
                bounds.push(...coords);

                if(leg.mode==='WALK'){
                    const pl = L.polyline(coords,{ color:'#4285F4', weight:2, opacity:0.25 }).addTo(this.map);
                    this.mapLayers.push(pl);
                    this.drawWalkDots(coords);
                } else {
                    const n=legName(leg);
                    const c=lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#888');
                    const pl = L.polyline(coords,{ color:c, weight:5, opacity:0.92 }).addTo(this.map);
                    this.mapLayers.push(pl);
                    this.addStopMarkers(leg, shownNames);
                }
            });

            const start = itin.legs[0];
            const end   = itin.legs[itin.legs.length-1];

            const mkFrom = L.circleMarker([start.from.lat, start.from.lon],{
                radius:7, color:'#555', fillColor:'#888', fillOpacity:1, weight:2
            }).addTo(this.map);

            const pinIcon = L.divIcon({
                className: '',
                html: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="32" viewBox="0 0 22 32"><path d="M11 0C4.9 0 0 4.9 0 11c0 8.2 11 21 11 21s11-12.8 11-21C22 4.9 17.1 0 11 0z" fill="#e53935"/><circle cx="11" cy="11" r="4" fill="white"/></svg>`,
                iconSize:[22,32], iconAnchor:[11,32]
            });
            const mkTo = L.marker([end.to.lat, end.to.lon],{ icon:pinIcon }).addTo(this.map);
            this.mapLayers.push(mkFrom, mkTo);

            if(bounds.length>0){
                this.overviewBounds = L.latLngBounds(bounds);
                if(!this.detailVisible) this.fitBounds(this.overviewBounds);
            }
        },

        _getBounds(itin) {
            const pts=[];
            itin.legs.forEach(leg=>{ pts.push(...this._resolveCoords(leg)); });
            return pts.length ? L.latLngBounds(pts) : null;
        },

        refitMap() {
            if(this.detailVisible && this.currentBounds) this.fitBounds(this.currentBounds,{maxZoom:15});
            else if(!this.detailVisible && this.overviewBounds) this.fitBounds(this.overviewBounds);
        },

        initSheetDrag() {
            const handle = document.getElementById('sh-handle');
            const sheet  = document.getElementById('bottom-sheet');
            if(!handle||!sheet) return;
            let startY, startH;

            const avail  = () => window.innerHeight - 60;
            const snaps  = () => { const a=avail(); return [a*0.12,a*0.40,a*0.95].map(Math.round); };
            const nearest= h => snaps().reduce((p,c)=>Math.abs(c-h)<Math.abs(p-h)?c:p);

            const applySnap = h => {
                sheet.style.transition = 'height 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
                sheet.style.height = nearest(h)+'px';
                setTimeout(()=>{ this.refitMap(); if(this._currentPopup) this._positionPopup(); }, 320);
            };

            handle._snapTo = ratio => {
                sheet.style.transition = 'height 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
                sheet.style.height = Math.round(avail()*ratio)+'px';
                setTimeout(()=>this.refitMap(), 320);
            };

            handle.addEventListener('mousedown', e => {
                startY=e.clientY; startH=sheet.offsetHeight;
                sheet.style.transition='none';
                const mm = e => {
                    const h=Math.max(snaps()[0],Math.min(snaps()[2],startH+(startY-e.clientY)));
                    sheet.style.height=h+'px';
                };
                const mu = () => { applySnap(sheet.offsetHeight); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
                window.addEventListener('mousemove',mm);
                window.addEventListener('mouseup',mu);
            });
            handle.addEventListener('touchstart', e=>{
                startY=e.touches[0].clientY; startH=sheet.offsetHeight;
                sheet.style.transition='none';
            },{passive:true});
            handle.addEventListener('touchmove', e=>{
                e.preventDefault();
                const h=Math.max(snaps()[0],Math.min(snaps()[2],startH+(startY-e.touches[0].clientY)));
                sheet.style.height=h+'px';
            },{passive:false});
            handle.addEventListener('touchend', ()=>applySnap(sheet.offsetHeight));
        },

        snapSheet(ratio) {
            const handle = document.getElementById('sh-handle');
            if(handle&&handle._snapTo) handle._snapTo(ratio);
        },

        showResultsPanel() {
            this.closePopup();
            document.getElementById('sheet-results').classList.remove('hidden');
            document.getElementById('sheet-detail').classList.remove('active');
            this.detailVisible = false;
        },

        showDetail(idx) {
            const itin = this.sortedItins[idx];
            if(!itin) return;
            this._activeDetailIdx = idx;

            document.getElementById('dvs-time').textContent  = `${fmtTime(itin.startTime)} – ${fmtTime(itin.endTime)} · ${fmtDur(itin.duration)}`;
            document.getElementById('dvs-route').textContent = `${this.from.name} – ${this.to.name}`;
            document.getElementById('dv-steps').innerHTML = this.buildSteps(itin);

            // Show "Commencer" button only for walk/bicycle modes
            const navBtn = document.getElementById('dv-start-nav-btn');
            navBtn.style.display = (this.travelMode === 'walk' || this.travelMode === 'bicycle') ? 'flex' : 'none';

            document.getElementById('sheet-results').classList.add('hidden');
            document.getElementById('sheet-detail').classList.add('active');
            document.body.classList.add('detail-open');
            this.detailVisible = true;

            this.drawRoute(itin);
            this.currentBounds = this._getBounds(itin);
            setTimeout(()=>{ if(this.currentBounds) this.fitBounds(this.currentBounds,{maxZoom:15}); }, 50);
            document.getElementById('dv-steps').scrollTop = 0;
        },

        closeDetail() {
            if(this._navMode) this.stopNavigation();
            document.body.classList.remove('detail-open');
            this.showResultsPanel();
            if(this.sortedItins.length>0) this.drawRoute(this.sortedItins[0]);
            setTimeout(()=>{ if(this.overviewBounds) this.fitBounds(this.overviewBounds); }, 50);
        },

        _stepId: 0,

        cleanHeadsign(h) {
            if(!h) return '–';
            const parts = h.split(',');
            return parts[parts.length-1].trim();
        },

        toggleStops(id) {
            const list   = document.getElementById('stops-list-'+id);
            const toggle = document.getElementById('stops-toggle-'+id);
            if(!list||!toggle) return;
            list.classList.toggle('open');
            toggle.classList.toggle('open');
        },

        buildSteps(itin) {
            let html='';
            const legs=itin.legs;
            this._stepId = (this._stepId||0);

            legs.forEach((leg,i)=>{
                const isFirst = i===0;
                const isLast  = i===legs.length-1;

                if(leg.mode==='BICYCLE'){
                    const dist   = fmtDist(leg.distance);
                    const durMin = Math.round(leg.duration/60);
                    html+=`<div class="step">
                        <div class="step-col">
                            <div class="sdot sdot-from" style="background:#34a853;border-color:#34a853"></div>
                            <div class="svline svline-walk" style="background:repeating-linear-gradient(to bottom,#34a853 0,#34a853 4px,transparent 4px,transparent 8px)"></div>
                        </div>
                        <div class="step-body">
                            <div class="step-title">${isFirst ? this.from.name : cleanName(leg.from.name)}</div>
                            <div class="step-sub">🚲 ${durMin} min · ${dist}</div>
                        </div>
                    </div>`;
                } else if(leg.mode==='WALK'){
                    const min  = Math.round(leg.duration/60);
                    const dist = fmtDist(leg.distance);

                    if(isFirst){
                        html+=`<div class="step">
                            <div class="step-col">
                                <div class="sdot sdot-from"></div>
                                <div class="svline svline-walk"></div>
                            </div>
                            <div class="step-body">
                                <div class="step-title">${this.from.name}</div>
                                <div class="step-sub">Marcher ${min} min · ${dist}</div>
                            </div>
                        </div>`;
                    } else if(isLast && leg.distance > 100){
                        html+=`<div class="step">
                            <div class="step-col">
                                <div class="sdot sdot-walk"></div>
                                <div class="svline svline-walk"></div>
                            </div>
                            <div class="step-body">
                                <div class="step-title">${cleanName(leg.from.name)}</div>
                                <div class="step-sub">Marcher ${min} min · ${dist}</div>
                            </div>
                        </div>`;
                    } else if(!isLast){
                        html+=`<div class="step">
                            <div class="step-col">
                                <div class="sdot sdot-walk"></div>
                                <div class="svline svline-walk"></div>
                            </div>
                            <div class="step-body">
                                <div class="step-title">Correspondance</div>
                                <div class="step-sub">${min} min à pied · ${dist}</div>
                            </div>
                        </div>`;
                    }
                } else {
                    const sid  = ++this._stepId;
                    const n    = legName(leg);
                    const c    = lineColor(n)||(leg.routeColor?'#'+leg.routeColor:'#888');
                    const tc   = lineTextColor(n);
                    const inter= leg.intermediateStops||[];
                    const numStops = inter.length + 1;
                    const durMin   = Math.round(leg.duration/60);
                    const dir      = this.cleanHeadsign(leg.headsign);

                    const interHTML = inter.map(s=>`
                        <div class="ts-stop-item">
                            <div class="ts-stop-dot" style="border-color:${c}"></div>
                            <span class="ts-stop-name">${cleanName(s.name)}</span>
                        </div>`).join('');

                    const departName = (i===0) ? this.from.name : cleanName(leg.from.name);

                    html+=`<div class="step">
                        <div class="step-col">
                            <div class="step-badge" style="background:${c};color:${tc}">${n}</div>
                            <div class="svline" style="background:${c};opacity:0.55"></div>
                        </div>
                        <div class="step-body">
                            <div class="ts-depart-name">${departName}</div>
                            <div class="ts-line-row">
                                <div class="ts-badge" style="background:${c};color:${tc}">${n}</div>
                                <span class="ts-direction">Direction : ${dir}</span>
                                <span class="ts-time">${fmtTime(leg.startTime)}</span>
                            </div>
                            ${inter.length>0 ? `
                            <div class="ts-stops-toggle" id="stops-toggle-${sid}" onclick="ITIN.toggleStops(${sid})">
                                <span class="ts-toggle-arrow">▼</span>
                                <span class="ts-stops-label">${numStops} arrêt${numStops>1?'s':''} · ${durMin} min</span>
                            </div>
                            <div class="ts-stops-list" id="stops-list-${sid}">${interHTML}</div>
                            ` : `<div class="ts-stops-label" style="font-size:0.74rem;color:var(--text-muted);margin-bottom:7px">${numStops} arrêt${numStops>1?'s':''} · ${durMin} min</div>`}
                            <div class="ts-arrive-row">
                                <span class="ts-arrive-name">${cleanName(leg.to.name)}</span>
                                <span class="ts-arrive-time">${fmtTime(leg.endTime)}</span>
                            </div>
                        </div>
                    </div>`;
                }
            });

            const last = legs[legs.length-1];
            html+=`<div class="step dest-step">
                <div class="step-col"><div class="sdot"></div></div>
                <div class="step-body">
                    <div class="step-title">${this.to.name}</div>
                    <div class="step-sub">Arrivée ${fmtTime(itin.endTime)}</div>
                </div>
            </div>`;

            return html;
        },

        // ── NAVIGATION MODE ──────────────────────────────────────────────────
        _navMode: false,
        _navCurrentItin: null,
        _navAllSteps: [],
        _navWatchId: null,
        _orientationHandler: null,
        _activeDetailIdx: 0,
        _navOffRouteCount: 0,
        _navFollowEnabled: true,
        _navOnMapDrag: null,

        async startNavigation() {
            if(!this._gpsPos) {
                navigator.geolocation && navigator.geolocation.getCurrentPosition(
                    pos => {
                        this._gpsPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                        if(this._gpsMarker) this._gpsMarker.setLatLng([this._gpsPos.lat, this._gpsPos.lon]);
                        this.startNavigation();
                    },
                    () => alert('Position GPS non disponible. Activez la localisation.'),
                    { enableHighAccuracy: true, timeout: 8000 }
                );
                return;
            }
            this._navMode = true;
            this._navOffRouteCount = 0;
            this._navFollowEnabled = true;

            document.body.classList.add('nav-active');
            document.getElementById('nav-overlay').style.display = 'flex';
            document.getElementById('nav-stop-btn').style.display = 'flex';
            document.getElementById('dv-start-nav-btn').style.display = 'none';

            this.map.setView([this._gpsPos.lat, this._gpsPos.lon], 17, { animate: true });

            document.getElementById('nav-instr-street').textContent = 'Calcul du trajet…';
            document.getElementById('nav-instr-dist').textContent = '';
            document.getElementById('nav-arrive-time').textContent = '—';
            document.getElementById('nav-remain-dist').textContent = '—';
            this._navSetArrow('CONTINUE');

            try {
                const mode = this.travelMode === 'bicycle' ? 'BICYCLE' : 'WALK';
                const url = `https://data.mobilites-m.fr/api/routers/default/plan?fromPlace=${this._gpsPos.lat},${this._gpsPos.lon}&toPlace=${this.to.lat},${this.to.lon}&numItineraries=1&mode=${mode}&showIntermediateStops=true&bannedAgencies=MCO:MCO`;
                const res = await fetch(url, { headers: { origin: 'ouestmontram' } });
                const data = await res.json();
                const itins = data && data.plan && data.plan.itineraries ? data.plan.itineraries : [];
                if(itins.length > 0) {
                    this._navCurrentItin = itins[0];
                    this._navAllSteps = this._extractNavSteps(itins[0]);
                    await this.drawRoute(itins[0]);
                }
            } catch(e) {
                const itin = this.sortedItins[this._activeDetailIdx];
                if(itin) { this._navCurrentItin = itin; this._navAllSteps = this._extractNavSteps(itin); }
            }

            this._navUpdateUI(this._gpsPos.lat, this._gpsPos.lon, null);

            if(this._navWatchId) navigator.geolocation.clearWatch(this._navWatchId);
            this._navWatchId = navigator.geolocation.watchPosition(
                pos => this._navOnPosition(pos),
                () => {},
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
            this._startOrientation();
            this.map.on('dragstart', this._navOnMapDrag = () => { this._navFollowEnabled = false; });
        },

        _navOnPosition(pos) {
            if(!this._navMode) return;
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const speed = pos.coords.speed;
            this._gpsPos = { lat, lon };
            if(this._gpsMarker) this._gpsMarker.setLatLng([lat, lon]);
            else {
                const icon = L.divIcon({ className:'', html:`<div class="gps-dot-wrap"><div class="gps-pulse"></div><div class="gps-dot"></div></div>`, iconSize:[22,22], iconAnchor:[11,11] });
                this._gpsMarker = L.marker([lat, lon], { icon, zIndexOffset:900, interactive:false }).addTo(this.map);
            }
            if(this._navFollowEnabled) this.map.panTo([lat, lon], { animate:true, duration:0.8, easeLinearity:0.25 });
            const kmh = speed != null ? Math.round(speed * 3.6) : null;
            this._navUpdateUI(lat, lon, kmh);
            if(this._navAllSteps.length > 0) {
                const minDist = Math.min(...this._navAllSteps.map(s => this._navDist(lat, lon, s.lat, s.lon)));
                if(minDist > 60) { this._navOffRouteCount++; if(this._navOffRouteCount >= 3) { this._navOffRouteCount = 0; this._navRecalculate(lat, lon); } }
                else this._navOffRouteCount = 0;
            }
        },

        async _navRecalculate(lat, lon) {
            const badge = document.getElementById('nav-recalc-badge');
            badge.style.display = 'block';
            try {
                const mode = this.travelMode === 'bicycle' ? 'BICYCLE' : 'WALK';
                const url = `https://data.mobilites-m.fr/api/routers/default/plan?fromPlace=${lat},${lon}&toPlace=${this.to.lat},${this.to.lon}&numItineraries=1&mode=${mode}&showIntermediateStops=true&bannedAgencies=MCO:MCO`;
                const res = await fetch(url, { headers: { origin: 'ouestmontram' } });
                const data = await res.json();
                const itins = data && data.plan && data.plan.itineraries ? data.plan.itineraries : [];
                if(itins.length > 0) { this._navCurrentItin = itins[0]; this._navAllSteps = this._extractNavSteps(itins[0]); await this.drawRoute(itins[0]); this._navUpdateUI(lat, lon, null); }
            } catch(e) {}
            badge.style.display = 'none';
        },

        _navUpdateUI(lat, lon, kmh) {
            document.getElementById('nav-speed-val').textContent = kmh != null ? kmh : '—';
            if(!this._navAllSteps.length) { document.getElementById('nav-instr-street').textContent = 'En route'; return; }
            let minDist = Infinity, closestIdx = 0;
            this._navAllSteps.forEach((s, i) => { const d = this._navDist(lat, lon, s.lat, s.lon); if(d < minDist) { minDist = d; closestIdx = i; } });
            const nextIdx = Math.min(closestIdx + 1, this._navAllSteps.length - 1);
            const next = this._navAllSteps[nextIdx];
            const distToNext = this._navDist(lat, lon, next.lat, next.lon);
            this._navSetArrow(next.direction === 'DESTINATION' ? 'CONTINUE' : next.direction);
            document.getElementById('nav-instr-street').textContent = next.direction === 'DESTINATION' ? '🏁 ' + (next.street || 'Arrivée') : (next.street || 'Continuer tout droit');
            document.getElementById('nav-instr-dist').textContent = fmtDist(distToNext);
            if(this._navCurrentItin) {
                const totalDistRemain = this._navRemainingDist(lat, lon);
                document.getElementById('nav-remain-dist').textContent = fmtDist(totalDistRemain);
                const totalDist = this._navTotalDist();
                const fraction = totalDist > 0 ? Math.max(0, Math.min(1, 1 - totalDistRemain / totalDist)) : 0;
                const remain = this._navCurrentItin.duration * (1 - fraction);
                const arr = new Date(Date.now() + remain * 1000);
                document.getElementById('nav-arrive-time').textContent = arr.getHours().toString().padStart(2,'0') + ':' + arr.getMinutes().toString().padStart(2,'0');
            }
        },

        _navSetArrow(direction) {
            const svg = document.getElementById('nav-arrow-svg');
            if(!svg) return;
            const W = 28;
            const ARROWS = {
                'LEFT':           `<line x1="14" y1="24" x2="14" y2="10"/><line x1="14" y1="10" x2="6" y2="10"/><polyline points="10,6 6,10 10,14"/>`,
                'SLIGHTLY_LEFT':  `<line x1="14" y1="24" x2="14" y2="14"/><line x1="14" y1="14" x2="8" y2="6"/><polyline points="4,10 8,6 12,8"/>`,
                'HARD_LEFT':      `<line x1="16" y1="24" x2="16" y2="14"/><line x1="16" y1="14" x2="4" y2="14"/><polyline points="8,10 4,14 8,18"/>`,
                'RIGHT':          `<line x1="14" y1="24" x2="14" y2="10"/><line x1="14" y1="10" x2="22" y2="10"/><polyline points="18,6 22,10 18,14"/>`,
                'SLIGHTLY_RIGHT': `<line x1="14" y1="24" x2="14" y2="14"/><line x1="14" y1="14" x2="20" y2="6"/><polyline points="24,10 20,6 16,8"/>`,
                'HARD_RIGHT':     `<line x1="12" y1="24" x2="12" y2="14"/><line x1="12" y1="14" x2="24" y2="14"/><polyline points="20,10 24,14 20,18"/>`,
                'UTURN_LEFT':     `<path d="M18 22 L18 10 C18 6 10 6 10 10 L10 14" stroke-linecap="round" fill="none"/><polyline points="6,10 10,14 14,10"/>`,
                'UTURN_RIGHT':    `<path d="M10 22 L10 10 C10 6 18 6 18 10 L18 14" stroke-linecap="round" fill="none"/><polyline points="22,10 18,14 14,10"/>`,
                'CONTINUE':       `<line x1="14" y1="24" x2="14" y2="6"/><polyline points="8,12 14,6 20,12"/>`,
            };
            svg.innerHTML = ARROWS[direction] || ARROWS['CONTINUE'];
        },

        _navRemainingDist(lat, lon) {
            if(!this._navAllSteps.length) return 0;
            let minDist = Infinity, closestIdx = 0;
            this._navAllSteps.forEach((s, i) => { const d = this._navDist(lat, lon, s.lat, s.lon); if(d < minDist) { minDist = d; closestIdx = i; } });
            let total = minDist;
            for(let i = closestIdx; i < this._navAllSteps.length - 1; i++) total += this._navDist(this._navAllSteps[i].lat, this._navAllSteps[i].lon, this._navAllSteps[i+1].lat, this._navAllSteps[i+1].lon);
            return total;
        },

        _navTotalDist() {
            let total = 0;
            for(let i = 0; i < this._navAllSteps.length - 1; i++) total += this._navDist(this._navAllSteps[i].lat, this._navAllSteps[i].lon, this._navAllSteps[i+1].lat, this._navAllSteps[i+1].lon);
            return total;
        },

        _navDist(lat1, lon1, lat2, lon2) { return L.latLng(lat1, lon1).distanceTo(L.latLng(lat2, lon2)); },

        _extractNavSteps(itin) {
            const steps = [];
            for(const leg of itin.legs) {
                if(!leg.steps || !leg.steps.length) {
                    if(leg.from && leg.from.lat != null) steps.push({ lat: leg.from.lat, lon: leg.from.lon, direction: 'CONTINUE', street: '' });
                    continue;
                }
                for(const step of leg.steps) {
                    if(step.lat == null || step.lon == null) continue;
                    steps.push({ lat: step.lat, lon: step.lon, direction: step.relativeDirection || 'CONTINUE', street: step.streetName || '', distance: step.distance || 0 });
                }
            }
            const lastLeg = itin.legs[itin.legs.length - 1];
            if(lastLeg && lastLeg.to && lastLeg.to.lat != null) steps.push({ lat: lastLeg.to.lat, lon: lastLeg.to.lon, direction: 'DESTINATION', street: this.to ? this.to.name : 'Destination' });
            return steps;
        },

        stopNavigation() {
            if(!this._navMode) return;
            this._navMode = false;
            if(this._navWatchId) { navigator.geolocation.clearWatch(this._navWatchId); this._navWatchId = null; }
            this._stopOrientation();
            if(this._navOnMapDrag) { this.map.off('dragstart', this._navOnMapDrag); this._navOnMapDrag = null; }
            if(this.map.setBearing) this.map.setBearing(0);
            document.body.classList.remove('nav-active');
            document.getElementById('nav-overlay').style.display = 'none';
            document.getElementById('nav-stop-btn').style.display = 'none';
            document.getElementById('nav-recalc-badge').style.display = 'none';
            document.getElementById('dv-start-nav-btn').style.display = (this.travelMode === 'walk' || this.travelMode === 'bicycle') ? 'flex' : 'none';
            if(this.currentBounds) this.fitBounds(this.currentBounds, { maxZoom: 15 });
            this.startGPS();
        },

        _startOrientation() {
            if(!window.DeviceOrientationEvent) return;
            if(typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(perm => { if(perm === 'granted') this._attachOrientation(); }).catch(() => {});
            } else {
                this._attachOrientation();
            }
        },

        _attachOrientation() {
            this._orientationHandler = (e) => {
                if(!this._navMode) return;
                let heading = null;
                if(e.webkitCompassHeading != null) heading = e.webkitCompassHeading;
                else if(e.alpha != null) heading = 360 - e.alpha;
                if(heading != null && this.map.setBearing) {
                    this.map.setBearing(heading);
                    const btn = document.getElementById('compass-btn');
                    const svg = document.getElementById('compass-svg');
                    btn && btn.classList.toggle('visible', Math.abs(heading) > 1);
                    if(svg) svg.style.transform = `rotate(${heading}deg)`;
                }
            };
            window.addEventListener('deviceorientation', this._orientationHandler, true);
        },

        _stopOrientation() {
            if(this._orientationHandler) { window.removeEventListener('deviceorientation', this._orientationHandler, true); this._orientationHandler = null; }
        },
        // ── END NAVIGATION MODE ───────────────────────────────────────────────

        getHistory(){ try{ return JSON.parse(localStorage.getItem('itin_hist')||'[]'); }catch{ return []; } },
        getFavs()   { try{ return JSON.parse(localStorage.getItem('itin_favs')||'[]'); }catch{ return []; } },
        saveHist(p) {
            try {
                const h=this.getHistory().filter(x=>x.name!==p.name);
                h.unshift({name:p.name,lat:p.lat,lon:p.lon,sub:p.sub||'',lines:p.lines||null,type:p.type});
                localStorage.setItem('itin_hist',JSON.stringify(h.slice(0,5)));
            } catch {}
        }
    };

    document.addEventListener('DOMContentLoaded', ()=>ITIN.init());
    </script>

    <script>
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('/ouestmontram/sw.js').catch(()=>{});
        }
    </script>
</body>
